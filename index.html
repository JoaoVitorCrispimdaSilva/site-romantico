<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>...</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Antes de entrar...</h2>
    <p>Digite a senha</p>

    <input type="text" id="senha" placeholder="..." />
    <br><br>
    <button onclick="verificar()">Entrar</button>

    <p id="erro" style="color: #ff4d6d;"></p>
  </div>

  <script>
    function verificar() {
      let entrada = document.getElementById("senha").value;

      // normaliza (resolve maiúsculas e espaços)
      entrada = entrada.trim().toLowerCase().replace(/\s+/g, " ");

      if (entrada === "a cabana") {
        // redireciona pro site principal
        window.location.href = "inicio.html";
      } else {
        document.getElementById("erro").innerText = "Senha incorreta...";
      }
    }
  </script>

</body>
</html>
